name = "Masaaki Takasago (sago35)"
company = "TinyGo Keeb"
image = "sago35.png"
socialUrl = "https://x.com/sago35tk"
bio = """Masaaki Takasago is an embedded software engineer who works with Go for both professional and hobby projects. A contributor to the TinyGo project and the author of a book on TinyGo, he is the creator of the "TinyGo Keeb Tour," a hands-on workshop that combines hardware soldering with Go firmware development. In 2025, he organized the TinyGo Conference in Japan, actively expanding the Go ecosystem into embedded systems and custom keyboards."""

[[sessions]]
title = "Build Your Own USB HID Keyboard with TinyGo (Live Coding)"
kind = "talk"
description = """Can you build a USB keyboard in 5 minutes with Go? Yes — and I'll do it live.

In this talk, I'll show how TinyGo lets you run Go on microcontrollers and turn your code into a real USB HID keyboard. It's the same approach we use in our TinyGo Keeb workshops in Japan, where soldering meets Go."""
