bio = """Sau Sheong is the Chief Technology Officer & Deputy Chief Executive of Product & Engineering at GovTech Singapore. Previously, he worked with SP Group, running a business unit as the CEO, as well as IT, OT and digital transformation for Singapore's main utility company. In his 30 years of experience, he has led product engineering initiatives at PayPal, Yahoo, and HP, founded a software company and headed technology teams in various startups. He is active in Singapore's tech community and has written five programming books, the last 2 books on Go."""
