name = "Ellen Gao"
company = "Flybits"
image = "ellen-gao.jpg"
socialUrl = "https://www.linkedin.com/in/ellen-gao-b23451109"
bio = """Ellen’s journey with Go started about 6 years ago when she secured an interview with Flybits for her last internship before graduation. At the time, she had never heard of Go... but seeing the beloved mascot was enough to convince Ellen that she was in for a treat. Since then, Ellen is proud to say that she has grown a lot as a Gopher, and is super excited to share a part of her journey with such an amazing community!"""

[[sessions]]
title = "A Retrospective on AI at Flybits"
kind = "talk"
description = """For our small backend team managing over 60 Go microservices, AI has become a core part of our development workflow. Recently, I’ve been reflecting on my own journey with these tools and how my colleagues have approached theirs. While everyone uses AI in their own way, many of our experiences overlap in interesting ways. In this talk, we’ll discuss the common themes that have emerged and how individual experiences shape the way we use AI."""
