[[sessions]]
title = "Your Tests Pass, But Do They Work? Mutation Testing in Go"
kind = "talk"
description = """100% coverage doesn't mean your tests catch bugs - a test with no assertions still counts. Mutation testing intentionally breaks your code to verify tests detect the change. I'll show how Go's AST and overlay system enable parallel mutation testing without modifying source files."""
